services:
  blog:
    build:
      context: .
      args:
      SITE_URL: ${SITE_URL:-https://ehuhe.github.io}
        BASE_PATH: ${BASE_PATH:-/}
    image: he-hu-academic-homepage:latest
    restart: unless-stopped
    ports:
      - "${BLOG_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
